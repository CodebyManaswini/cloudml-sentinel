name: CloudML Sentinel CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: manaswini6i
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: manaswini6i/cloudml-sentinel:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.229.243.231                    
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/cloudml-sentinel || mkdir -p ~/cloudml-sentinel && cd ~/cloudml-sentinel
            
            git pull origin main || true
            
            # Pull latest image and restart services
            docker compose pull
            docker compose down || true
            docker compose up -d
            
            echo "✅ Deployment Successful!"
            echo "🌐 App        → http://$(curl -s ifconfig.me):8000"
            echo "📊 Prometheus → http://$(curl -s ifconfig.me):9090"
            echo "📈 Grafana    → http://$(curl -s ifconfig.me):3000"