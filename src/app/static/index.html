<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudML Sentinel</title>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(to right, #667eea, #764ba2); color: white; text-align: center; padding: 50px; }
    .container { max-width: 600px; margin: auto; background: rgba(0,0,0,0.3); padding: 30px; border-radius: 15px; }
    input { width: 80%; padding: 15px; margin: 20px 0; border: none; border-radius: 8px; font-size: 18px; }
    button { padding: 15px 30px; font-size: 18px; background: #ff6b6b; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button:hover { background: #ff5252; }
    #result { margin-top: 20px; font-size: 24px; min-height: 50px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌥️ CloudML Sentinel</h1>
    <h2>Sentiment Analysis</h2>
    
    <input type="text" id="textInput" placeholder="Type your text here..." />
    <br>
    <button onclick="analyzeSentiment()">Analyze Sentiment</button>
    
    <div id="result"></div>
  </div>

  <script>
    async function analyzeSentiment() {
      const text = document.getElementById('textInput').value;
      const resultDiv = document.getElementById('result');
      
      if (!text) {
        resultDiv.innerHTML = "Please enter some text!";
        return;
      }

      resultDiv.innerHTML = "Analyzing...";

      try {
        const response = await fetch('http://127.0.0.1:8000/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text: text })
        });
        
        const data = await response.json();
        
        const color = data.sentiment === 'POSITIVE' ? 'lightgreen' : 'lightcoral';
        resultDiv.innerHTML = `
          <strong>${data.sentiment}</strong> (${data.confidence * 100}%)<br>
          <small>Model: ${data.model}</small>
        `;
        resultDiv.style.color = color;
      } catch (error) {
        resultDiv.innerHTML = "Error connecting to server. Is Docker running?";
      }
    }
  </script>
</body>
</html>
